<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient: deep slate to dark navy -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C2340"/>
      <stop offset="100%" style="stop-color:#0D1220"/>
    </linearGradient>
    <!-- Clipboard body gradient -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2A3456"/>
      <stop offset="100%" style="stop-color:#1E2740"/>
    </linearGradient>
    <!-- Accent gradient for clip -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4DFFB0"/>
      <stop offset="100%" style="stop-color:#00C97A"/>
    </linearGradient>
    <!-- Shine overlay -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="clipShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Subtle grid texture lines -->
  <g opacity="0.04" clip-path="url(#roundedSquare)">
    <line x1="0" y1="170" x2="1024" y2="170" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="340" x2="1024" y2="340" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="510" x2="1024" y2="510" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="680" x2="1024" y2="680" stroke="#ffffff" stroke-width="1"/>
    <line x1="0" y1="850" x2="1024" y2="850" stroke="#ffffff" stroke-width="1"/>
    <line x1="170" y1="0" x2="170" y2="1024" stroke="#ffffff" stroke-width="1"/>
    <line x1="340" y1="0" x2="340" y2="1024" stroke="#ffffff" stroke-width="1"/>
    <line x1="510" y1="0" x2="510" y2="1024" stroke="#ffffff" stroke-width="1"/>
    <line x1="680" y1="0" x2="680" y2="1024" stroke="#ffffff" stroke-width="1"/>
    <line x1="850" y1="0" x2="850" y2="1024" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- Clipboard body -->
  <rect x="240" y="200" width="544" height="660" rx="40" ry="40"
        fill="url(#boardGrad)" filter="url(#shadow)"
        stroke="#3A4870" stroke-width="2"/>

  <!-- Clipboard body inner highlight -->
  <rect x="242" y="200" width="542" height="330" rx="40" ry="0"
        fill="url(#shine)"/>

  <!-- Clip (top bar) - the "keeper" element in accent green -->
  <rect x="380" y="160" width="264" height="120" rx="30" ry="30"
        fill="url(#accentGrad)" filter="url(#clipShadow)"/>
  <!-- Clip inner slot -->
  <rect x="430" y="195" width="164" height="50" rx="14" ry="14"
        fill="#0D1220" opacity="0.5"/>
  <!-- Clip top curve highlight -->
  <rect x="380" y="160" width="264" height="50" rx="30" ry="30"
        fill="#ffffff" opacity="0.12"/>

  <!-- Content lines on clipboard — stacked entries suggesting clipboard history -->

  <!-- Entry 1 (top, brightest - active) -->
  <rect x="300" y="350" width="424" height="14" rx="7" fill="#4DFFB0" opacity="0.85" filter="url(#glowGreen)"/>
  <rect x="300" y="380" width="300" height="10" rx="5" fill="#ffffff" opacity="0.18"/>

  <!-- Entry 2 -->
  <rect x="300" y="440" width="340" height="10" rx="5" fill="#ffffff" opacity="0.22"/>
  <rect x="300" y="464" width="250" height="8" rx="4" fill="#ffffff" opacity="0.12"/>

  <!-- Divider -->
  <line x1="300" y1="500" x2="724" y2="500" stroke="#3A4870" stroke-width="1.5"/>

  <!-- Entry 3 -->
  <rect x="300" y="520" width="380" height="10" rx="5" fill="#ffffff" opacity="0.18"/>
  <rect x="300" y="544" width="200" height="8" rx="4" fill="#ffffff" opacity="0.10"/>

  <!-- Divider -->
  <line x1="300" y1="580" x2="724" y2="580" stroke="#3A4870" stroke-width="1.5"/>

  <!-- Entry 4 (faded) -->
  <rect x="300" y="600" width="310" height="10" rx="5" fill="#ffffff" opacity="0.13"/>
  <rect x="300" y="624" width="160" height="8" rx="4" fill="#ffffff" opacity="0.08"/>

  <!-- Divider -->
  <line x1="300" y1="660" x2="724" y2="660" stroke="#3A4870" stroke-width="1.5"/>

  <!-- Entry 5 (most faded) -->
  <rect x="300" y="680" width="260" height="10" rx="5" fill="#ffffff" opacity="0.08"/>
  <rect x="300" y="704" width="140" height="8" rx="4" fill="#ffffff" opacity="0.05"/>

  <!-- Shine overlay on whole icon -->
  <rect x="0" y="0" width="1024" height="512" rx="230" ry="0"
        fill="url(#shine)" clip-path="url(#roundedSquare)"/>
</svg>
